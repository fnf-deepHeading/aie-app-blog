name: Deploy to DCS AI

# main 에 글/코드가 push 되면 → ① CI 빌드 검증 → ② 통과 시에만 DCS AI 재배포.
# GitHub 웹에서 글을 고쳐도 빌드가 깨지면 재배포를 막아 라이브를 보호한다.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch: {} # 수동 실행도 허용

concurrency:
  group: deploy-dcsai
  cancel-in-progress: true

jobs:
  build-check:
    name: 빌드 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  redeploy:
    name: DCS AI 재배포
    needs: build-check # 빌드 통과해야만 실행
    runs-on: ubuntu-latest
    steps:
      - name: Trigger redeploy
        env:
          DCSAI_API_KEY: ${{ secrets.DCSAI_API_KEY }}
          APP_ID: 5231337c-2a88-4de1-8cab-74fb5e6025f5
        run: |
          if [ -z "$DCSAI_API_KEY" ]; then
            echo "::error::DCSAI_API_KEY 시크릿이 없습니다. 레포 Settings → Secrets and variables → Actions 에 추가하세요."
            exit 1
          fi
          code=$(curl -sS -o resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DCSAI_API_KEY" \
            "https://dcsai.fnf.co.kr/server/external-apps/embedded/$APP_ID/redeploy")
          echo "HTTP $code"
          cat resp.json || true
          echo
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::재배포 트리거 실패 (HTTP $code)"
            exit 1
          fi
          echo "✅ 재배포 트리거됨 — 대시보드에서 1~2분 뒤 반영 확인"
